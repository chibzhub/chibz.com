<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chibz Fun Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            padding: 50px;
            transition: background-color 0.5s ease;
            height: 100vh;
        }

        h1 {
            font-size: 3em;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
        }

        button {
            font-size: 1.5em;
            padding: 15px 30px;
            margin-top: 30px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background-color: #FFD700;
            color: #000;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.1);
        }

        p {
            font-size: 1.2em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Welcome to Chibz Fun Page!</h1>
    <p>Click the button to change the background color!</p>
    <button id="funButton">Change Color</button>
    <p id="message"></p>

    <script>
        const button = document.getElementById('funButton');
        const message = document.getElementById('message');

        const messages = [
            "Wow! Look at that color! 🌈",
            "Isn’t this fun? 😎",
            "Keep clicking for more surprises! 🎉",
            "You’re awesome for clicking this! ✨",
            "Chibz says hi! 👋"
        ];

        button.addEventListener('click', () => {
            // Generate random color
            const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16);
            document.body.style.backgroundColor = randomColor;

            // Show a random message
            const randomMessage = messages[Math.floor(Math.random() * messages.length)];
            message.textContent = randomMessage;
        });
    </script>
</body>
</html>
